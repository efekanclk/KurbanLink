name: KurbanLink Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying to AWS Lightsail
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/KurbanLink
            git fetch origin main
            git reset --hard origin/main
            
            # Backend Güncelleme
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            pm2 restart kurban-backend
            
            # Frontend Güncelleme
            cd ../frontend
            npm install
            
            # Localhost temizliği
            find src -type f -exec sed -i 's|http://localhost:8000|https://kurbanlink.com|g' {} +
            
            # Build ve Restart (dist/ klasörünü serve ile sun)
            npm run build
            pm2 delete kurban-frontend || true
            pm2 start "serve -s dist -l 3000" --name kurban-frontend
            pm2 save